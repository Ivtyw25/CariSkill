scrape_task:
  description: >
    We are building content for the Macro Node: "{macro_title}".
    The specific sub-topics to research are: {micro_topics_list}.
    
    Your job is to perform a deep research dive using the `DeepSearchTool`.
    
    For EACH sub-topic:
    1. SEARCH: Fire a query into the `DeepSearchTool` to find documentation and video links.
    2. ANALYZE: Review the extracted markdown content provided by the tool. Identify high-signal facts, 
       technical architectures, and specific code examples that are relevant to the user's experience level ({experience}) and goal ({goal}).
    3. COMPILE: Gather the best URLs and their titles, ensuring you prioritize sources that returned clean, readable markdown content.
    
    IMPORTANT RULES:
    - You are now a DEEP RESEARCHER. You must leverage the markdown content returned by your tool.
    - Extract code snippets and detailed explanations from the sources to pass to the Educator.
    - If a tool returns no content or irrelevant results for a specific search, SKIP IT.
    - Do not hallucinate or make up URLs or content.
  expected_output: >
    A comprehensive research report for each sub-topic, including validated URLs, titles, and a synthesis of the key technical information extracted from the markdown content.
  agent: scraper
  
educate_task:
  description: >
    Review the deep research report curated by the Researcher. 
    Now, write the theoretical explanation for EACH of these micro-topics: {micro_topics_list}.
    
    Use the extracted facts and code snippets from the Researcher's report to make your theory 100% accurate and practical.
    Keep the user's experience level ({experience}) and goal ({goal}) in mind.
    Make the theory highly engaging. explain theory in details but being concise with words that won't overwhelm the reader.
    You MUST embed contextually relevant images inline between your text paragraphs using Markdown format: `![Descriptive Alt Text](image_url)`. 
    * ONLY use URLs provided in the 'Available Images' list from the context.
    * Analyze the image URLs: prioritize URLs that contain words like 'diagram', 'chart', 'graph', 'example', or specific concept names. Ignore generic URLs.  
    You must also evaluate and assign a difficulty rating ("easy", "medium", or "hard") for each topic.
  expected_output: >
    A comprehensive document containing the written theory and difficulty rating for every requested micro-topic.
  agent: educator

estimate_and_compile_task:
  description: >
    Review the Researcher's resources and the Educator's theory for the Macro Node: "{macro_title}" (ID: {node_id}).
    
    1. Estimate the time to read the Educator's theory (~250 words/min).
    2. Estimate the time to consume each external resource (e.g., standard tech article = 5 mins, standard tutorial video = 10 mins unless specified).
    3. Calculate the total time for each micro-topic, and the grand total for the macro node.
    4. Compile everything perfectly into the requested JSON schema.
  expected_output: >
    The final, perfectly formatted MacroNodeContent JSON object.
  agent: estimator
